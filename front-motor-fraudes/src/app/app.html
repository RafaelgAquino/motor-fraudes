<div class="painel-bancario">
  <div class="cabecalho">
    <h1>🏦 Bradesco Sec - Motor de Fraudes</h1>
    <p>Terminal de Transferência PIX via API</p>
  </div>

  <div class="formulario-pix">
    <div class="campo">
      <label>Conta de Origem (Vítima):</label>
      <input type="text" placeholder="Ex: 12345-6" #contaOrigem>
    </div>

    <div class="campo">
      <label>Conta de Destino (Laranja):</label>
      <input type="text" placeholder="Ex: 98765-4" #contaDestino>
    </div>

    <div class="campo">
      <label>Valor da Transferência (R$):</label>
      <input type="number" placeholder="Ex: 15000" #valor>
    </div>

    <button class="botao-disparo" (click)="dispararPix(contaOrigem.value, contaDestino.value, valor.value)">
      🔥 Disparar Transferência
    </button>
  </div>
</div>
